  <text x="24" y="657" fill="#166534" font-family="Georgia,serif" font-size="14">The Supplier may change the Fees on at least</text><text x="24" y="679" fill="#166534" font-family="Georgia,serif" font-size="14">30 days' prior written notice. The Customer may</text><text x="24" y="701" fill="#166534" font-family="Georgia,serif" font-size="14">terminate before revised Fees take effect.</text>
